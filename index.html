<script>

  
    let isImageValid = false;

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
        });
    }

    // Handle image file selection
    document.getElementById('imageInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        const imageStatus = document.getElementById('imageStatus');
        
        if (file) {
            const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif', 'image/webp'];
            if (!validTypes.includes(file.type)) {
                imageStatus.textContent = '❌ Invalid file type. Please upload an image.';
                event.target.value = '';
                document.getElementById('imagePreviewRow').classList.remove('show');
                document.getElementById('imagePreviewThumb').src = '';
                document.getElementById('previewFileName').textContent = '';
                isImageValid = false;
                updateSubmitButtonState();
                return;
            }
            
            const maxSizeMB = 2;
            if (file.size > maxSizeMB * 1024 * 1024) {
                imageStatus.textContent = 'Նկարը մեծ է: Ընտրիր մինչև 2 ՄԲ տարբերակ';
                event.target.value = '';
                document.getElementById('imagePreviewRow').classList.remove('show');
                document.getElementById('imagePreviewThumb').src = '';
                document.getElementById('previewFileName').textContent = '';
                isImageValid = false;
                updateSubmitButtonState();
                return;
            }
            
            const sizeMB = (file.size / 1024 / 1024).toFixed(2);
            imageStatus.textContent = ``;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreviewThumb').src = e.target.result;
                document.getElementById('previewFileName').textContent = file.name;
                document.getElementById('imagePreviewRow').classList.add('show');
            };
            reader.readAsDataURL(file);
            isImageValid = true;
            updateSubmitButtonState();
        } else {
            imageStatus.textContent = '';
            document.getElementById('imagePreviewRow').classList.remove('show');
            isImageValid = false;
            updateSubmitButtonState();
        }
    });

    function clearImageSelection() {
        const imageInput = document.getElementById('imageInput');
        const imageStatus = document.getElementById('imageStatus');
        imageInput.value = '';
        imageStatus.textContent = '';
        document.getElementById('imagePreviewRow').classList.remove('show');
        document.getElementById('imagePreviewThumb').src = '';
        document.getElementById('previewFileName').textContent = '';
        isImageValid = false;
        updateSubmitButtonState();
    }


    async function sendData() {
        const url = "/api/data";
        const submitBtn = document.querySelector(".submit-btn");
        const msgDiv = document.getElementById("msg");

        // Validate ID
        const userId = document.querySelector("#id-number")?.value?.trim();
        if (!userId) {
            msgDiv.textContent = '❌ Please enter your ID';
            msgDiv.style.color = '#ff6b6b';
            return;
        }


        // Get image file
        const file = document.querySelector("#imageInput")?.files?.[0];
        let imageBase64 = "";
        
        if (file) {
            try {
                imageBase64 = await fileToBase64(file);
                console.log('Image successfully converted to base64');
            } catch (err) {
                msgDiv.textContent = '❌ Error processing image. Please try again.';
                msgDiv.style.color = '#ff6b6b';
                console.error('Error converting image:', err);
                return;
            }
        } else {
            console.log('No image selected - proceeding without image');
        }

        const data = {
            userId: userId,
           
            ts: new Date().toISOString(),
            image: imageBase64
        };

        // Disable button during submission
        submitBtn.disabled = true;
        msgDiv.textContent = 'Ուղարկվում է...';
        msgDiv.style.color = '#fbe10a';

        try {
            const res = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            if (!res.ok) {
                throw new Error(`HTTP error! status: ${res.status}`);
            }

            const responseData = await res.json();
            console.log('Server response:', responseData);

            // Show success message
            document.querySelector(".landing-page").style.display = "none";
            document.querySelector(".success-massage-block").style.display = "flex";

        } catch (err) {
            console.error("Error:", err);
            msgDiv.textContent = '❌ Error submitting data. Please try again.';
            msgDiv.style.color = '#ff6b6b';
            submitBtn.disabled = false;
        }
    }
</script>

<script>

  
   

    const input = document.getElementById("id-number");
    const errorDiv = document.querySelector(".error-message");
    const submitBtn = document.querySelector(".submit-btn");

    function updateSubmitButtonState() {
        const isIdValid = input.value.length === 9 && !input.value.startsWith("0");
        submitBtn.disabled = !(isIdValid && isImageValid);
    }

    submitBtn.disabled = true;

    input.addEventListener("input", handleInput);
    input.addEventListener("blur", validateID);

    function handleInput(e) {
        // Remove non-digits
        e.target.value = e.target.value.replace(/\D/g, "");
        validateID();
    }

    function validateID() {
        const value = input.value;

        input.setCustomValidity("");
        errorDiv.textContent = "";

        if (!value) {
            input.setCustomValidity("Պահանջվում է ID։");
            errorDiv.textContent = "Պահանջվում է ID և միայն թվեր։";
            updateSubmitButtonState();
            return;
        }

        if (value.length !== 9) {
            input.setCustomValidity("ID-ն պետք է լինի ճիշտ 9 թվանշան։");
            errorDiv.textContent = "ID-ն պետք է լինի ճիշտ 9 թվանշան։";
            updateSubmitButtonState();
            return;
        }

        if (value.startsWith("0")) {
            input.setCustomValidity("ID-ն չի կարող սկսվել 0-ով։");
            errorDiv.textContent = "ID-ն չի կարող սկսվել 0-ով։";
            updateSubmitButtonState();
            return;
        }

        // valid - updateSubmitButtonState will enable button if image is also valid
        updateSubmitButtonState();
    }

</script>
